<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Giải Toán Thần Tốc</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100">
        <h1 class="text-3xl font-extrabold text-center text-indigo-600 mb-2">🧮 Trợ Lý AI Giải Toán</h1>
        <p class="text-gray-500 text-center mb-6">Nhập đề bài toán của bạn vào ô dưới đây để nhận lời giải chi tiết từ AI.</p>

        <form action="/" method="POST" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Đề bài toán:</label>
                <textarea name="problem" rows="4" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" placeholder="Ví dụ: Tìm x biết: x^2 - 5x + 6 = 0" required>{{ problem }}</textarea>
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition duration-200 cursor-pointer text-center">
                🚀 Bắt Đầu Giải Toán
            </button>
        </form>

        {% if response %}
        <div class="mt-6 p-5 bg-indigo-50/50 border-l-4 border-indigo-500 rounded-r-xl">
            <h3 class="text-lg font-bold text-indigo-900 mb-2">📊 Lời giải chi tiết:</h3>
            <p class="text-gray-700 whitespace-pre-line leading-relaxed">{{ response }}</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
